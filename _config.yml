title: "MyeongSeokKo Dev Log"
subtitle: "TIL / WIL"
name: "MyeongSeokKo"
description: "매일 배운 것과 매주 돌아본 것을 기록하는 개발 블로그입니다."
url: "https://kms5378.github.io"
baseurl: ""
repository: "kms5378/kms5378.github.io"
locale: "ko-KR"
timezone: "Asia/Seoul"

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "air"

search: true
search_full_content: true

author:
  name: "MyeongSeokKo"
  bio: "TIL과 WIL로 학습 기록을 쌓는 개발자"
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kms5378"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/kms5378"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      toc: true
      toc_sticky: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

include:
  - _pages

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
